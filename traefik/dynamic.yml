###############################################################################
# dynamic.yml — Configuration dynamique
# Rechargé à chaud par Traefik — aucun restart requis.
###############################################################################

http:
  middlewares:

    # ─────────────────────────────────────────────────────────────────────
    # AUTH BASIQUE — Protection des interfaces internes
    # Utilisé sur : dashboard Traefik, Prometheus, Grafana
    #
    # Générer le hash sur la VM :
    #   sudo apt install apache2-utils
    #   htpasswd -nb rookain MON_MOT_DE_PASSE
    #
    # ⚠️  Dans ce fichier YAML, chaque $ doit être doublé en $$
    #     Exemple : $apr1$abc → $$apr1$$abc
    # ─────────────────────────────────────────────────────────────────────
    auth-basic:
      basicAuth:
        users:
          - "rookain:$apr1$9IyBjbhP$10RRWUX7uBagQac8ZDv5X/"

    # ─────────────────────────────────────────────────────────────────────
    # HEADERS DE SÉCURITÉ — Services exposés publiquement
    # Appliquer sur : portfolio, uptime-kuma
    # ─────────────────────────────────────────────────────────────────────
    secure-headers:
      headers:
        stsSeconds: 31536000          # HSTS 1 an — force HTTPS
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true               # Anti-clickjacking
        contentTypeNosniff: true      # Anti-MIME sniffing
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""            # Ne pas révéler la stack technique
          Server: ""

    # ─────────────────────────────────────────────────────────────────────
    # RATE LIMITING — Anti-abus sur les endpoints publics
    # ─────────────────────────────────────────────────────────────────────
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
