###############################################################################
# docker-compose.yml — Traefik Reverse Proxy
# Projet  : Portfolio kiwinet.me
# VM      : Debian 13.3 ARM AArch64 (Freebox Delta)
# Image   : traefik:v3 (compatible linux/arm64)
# SSL     : Let's Encrypt — HTTP Challenge (IP fixe, port 80 ouvert)
###############################################################################

services:

  # ─────────────────────────────────────────────────────────────────────────
  # TRAEFIK — Point d'entrée unique HTTP/HTTPS
  # ─────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped

    ports:
      - "80:80"     # HTTP  → redirigé automatiquement vers HTTPS
                    #         aussi utilisé par Let's Encrypt HTTP Challenge
      - "443:443"   # HTTPS → trafic SSL principal

    volumes:
      # Accès lecture seule au socket Docker (découverte automatique des containers)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Configuration statique (entrypoints, ACME, logs)
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Configuration dynamique (middlewares, headers sécurité)
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      # Stockage persistant des certificats Let's Encrypt
      # CRITIQUE : permissions 600 obligatoires (voir guide)
      - ./traefik/acme.json:/acme.json

    networks:
      - proxy

    labels:
      - "traefik.enable=true"

      # ── Dashboard Traefik ───────────────────────────────────────────────
      # Accessible sur https://traefik.kiwinet.me
      # Protégé par authentification basique (définie dans dynamic.yml)
      - "traefik.http.routers.dashboard.rule=Host(`traefik.kiwinet.me`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth-basic@file"


  # ─────────────────────────────────────────────────────────────────────────
